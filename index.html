const IMAGES = {};
const img = (key) => {
  if (!key) return null;
  if (typeof key === "string" && key.startsWith("data:")) return key;
  return IMAGES[key] ? `data:image/jpeg;base64,${IMAGES[key]}` : null;
};

function resizeImageFile(file, maxDim = 640, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const image = new window.Image();
      image.onload = () => {
        let { width, height } = image;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round((height * maxDim) / width); width = maxDim; }
          else { width = Math.round((width * maxDim) / height); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(image, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      image.onerror = reject;
      image.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ============================== HELPERS ============================== */
const formatFCFA = (n) => `${Math.round(Number(n) || 0).toLocaleString("fr-FR")} FCFA`;
const genOrderId = () => "MW" + Date.now().toString(36).toUpperCase().slice(-5) + Math.floor(10 + Math.random() * 89);
const genPartnerCode = (name) => {
  const initials = name.trim().split(/\s+/).map((w) => w[0]).join("").toUpperCase().slice(0, 3) || "MW";
  return `MW-${initials}${Math.floor(100 + Math.random() * 900)}`;
};
const fmtDate = (iso) => {
  try { return new Date(iso).toLocaleString("fr-FR", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }); }
  catch (e) { return iso; }
};
const groupMeta = (id) => GROUPS_META.find((g) => g.id === id) || GROUPS_META[0];

function persist(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch (e) { console.error("Erreur de sauvegarde", key, e); return false; }
}

function ItemThumb({ item, size = 58, rounded = "rounded-xl" }) {
  const src = img(item.image);
  const gi = groupMeta(item.groupId);
  if (src) {
    return <img src={src} alt={item.name} className={`${rounded} object-cover flex-shrink-0`} style={{ width: size, height: size }} />;
  }
  return (
    <div className={`${rounded} flex items-center justify-center flex-shrink-0`} style={{ width: size, height: size, fontSize: size * 0.42, background: `linear-gradient(135deg, ${PALETTE.creamSoft}, ${PALETTE.goldSoft}66)` }}>
      {gi.icon}
    </div>
  );
}

function CircularProgress({ value, size = 104, stroke = 9, color = PALETTE.gold, track = PALETTE.creamSoft, label, sublabel }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = Math.min(Math.max(value, 0), 1);
  const offset = c - pct * c;
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size / 2} cy={size / 2} r={r} stroke={track} strokeWidth={stroke} fill="none" />
        <circle cx={size / 2} cy={size / 2} r={r} stroke={color} strokeWidth={stroke} fill="none" strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.7s ease" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <span className="font-display" style={{ fontSize: size * 0.27, fontWeight: 700, color: PALETTE.ink, lineHeight: 1 }}>{label}</span>
        {sublabel && <span style={{ fontSize: size * 0.105, color: PALETTE.inkSoft, marginTop: 3, textAlign: "center" }}>{sublabel}</span>}
      </div>
    </div>
  );
}

function StatusBadge({ status }) {
  const map = {
    "Nouvelle": { bg: PALETTE.redSoft, color: PALETTE.red },
    "En préparation": { bg: PALETTE.goldSoft, color: PALETTE.goldDeep },
    "Prête": { bg: "#DCEAFB", color: "#2A5C92" },
    "Livrée": { bg: PALETTE.greenSoft, color: PALETTE.green },
  };
  const s = map[status] || map["Nouvelle"];
  return <span className="rounded-full px-2.5 py-1 text-xs font-semibold" style={{ background: s.bg, color: s.color }}>{status}</span>;
}

function Toast({ message, onClose }) {
  useEffect(() => { if (!message) return; const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, [message]);
  if (!message) return null;
  return (
    <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] rounded-xl px-5 py-3 flex items-center gap-2 shadow-lg" style={{ background: PALETTE.black, color: PALETTE.cream }}>
      <Check size={16} color={PALETTE.gold} /><span style={{ fontSize: 13.5, fontWeight: 500 }}>{message}</span>
    </div>
  );
}

function useBodyScrollLock() {
  useEffect(() => {
    const original = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = original; };
  }, []);
}

function MenuView({ menu, orders, partners, settings, onPlaceOrder, notify }) {
  const [activeCat, setActiveCat] = useState("sale");
  const groupsInCat = useMemo(() => GROUPS_META.filter((g) => g.category === activeCat), [activeCat]);
  const [activeGroup, setActiveGroup] = useState(groupsInCat[0]?.id);

  useEffect(() => { setActiveGroup(groupsInCat[0]?.id); }, [activeCat]);

  const [cart, setCart] = useState({});
  const [cartOpen, setCartOpen] = useState(false);
  const [checkoutOpen, setCheckoutOpen] = useState(false);
  const [confirmed, setConfirmed] = useState(null);
  const [trackOpen, setTrackOpen] = useState(false);

  const visibleItems = useMemo(() => menu.filter((m) => m.groupId === activeGroup && m.active !== false), [menu, activeGroup]);
  const cartItems = useMemo(() => Object.entries(cart).filter(([, q]) => q > 0).map(([id, qty]) => ({ ...menu.find((m) => m.id === id), qty })).filter((i) => i.id), [cart, menu]);
  const cartTotal = cartItems.reduce((s, i) => s + i.price * i.qty, 0);
  const cartCount = cartItems.reduce((s, i) => s + i.qty, 0);

  const updateQty = (id, delta) => setCart((c) => ({ ...c, [id]: Math.max(0, (c[id] || 0) + delta) }));

  const handleConfirmOrder = async (form) => {
    const partner = partners.find((p) => p.code.toLowerCase() === form.partnerCode.trim().toLowerCase());
    const order = {
      customerName: form.name, phone: form.phone, orderType: form.orderType,
      items: cartItems.map((i) => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
      total: cartTotal, partnerCode: partner ? partner.code : "", note: form.note,
      deliveryAddress: form.deliveryAddress || "", deliveryCoords: form.deliveryCoords || null,
      paymentMethod: form.paymentMethod, paid: false,
    };
    const saved = await onPlaceOrder(order);
    setConfirmed(saved); setCart({}); setCheckoutOpen(false); setCartOpen(false);
  };

  return (
    <div style={{ position: "relative" }}>
      {/* blurred burger background */}
      <div style={{ position: "fixed", inset: 0, zIndex: 0, backgroundImage: `url(${img("bg_burger")})`, backgroundSize: "cover", backgroundPosition: "center 35%", filter: "blur(9px) brightness(0.95)", transform: "scale(1.12)" }} />
      <div style={{ position: "fixed", inset: 0, zIndex: 0, background: PALETTE.cream, opacity: 0.74 }} />

      <div style={{ position: "relative", zIndex: 1 }}>
        {/* Hero */}
        <div className="px-4 sm:px-6 pt-8 pb-7" style={{ background: PALETTE.black }}>
          <div className="max-w-5xl mx-auto">
            <Eyebrow>Carte digitale · Yaoundé</Eyebrow>
            <h1 className="font-display" style={{ color: PALETTE.cream, fontSize: 30, fontWeight: 700, maxWidth: 480, lineHeight: 1.15 }}>Goûts modernes, commande digitalisée.</h1>
            <p style={{ color: PALETTE.inkSoft, marginTop: 8, fontSize: 13.5, maxWidth: 420 }}>Choisissez une catégorie, puis une formule. Ajoutez le code d'un partenaire si vous en avez un.</p>
            <div className="flex flex-wrap items-center gap-x-5 gap-y-2 mt-4">
              <button onClick={() => setTrackOpen(true)} className="inline-flex items-center gap-1.5 text-sm font-semibold" style={{ color: PALETTE.gold }}>Suivre une commande <ChevronRight size={15} /></button>
              {settings.serviceTel && (
                <a href={`tel:${settings.serviceTel.replace(/\s+/g, "")}`} className="inline-flex items-center gap-1.5 text-sm font-semibold" style={{ color: PALETTE.creamSoft }}>
                  <Phone size={14} color={PALETTE.gold} /> {settings.serviceTel}
                </a>
              )}
            </div>
          </div>
        </div>

        {/* Category pills */}
        <div className="max-w-5xl mx-auto px-4 sm:px-6 -mt-4">
          <div className="rounded-2xl p-2 flex gap-2 overflow-x-auto scrollbar-thin" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>

                      )}

              );
            })}
            {visibleItems.length === 0 && <p style={{ color: PALETTE.inkSoft, fontSize: 13.5 }} className="col-span-2 text-center py-10">Aucun article disponible pour cette formule actuellement.</p>}

          <button onClick={() => setCartOpen(true)} className="fixed bottom-4 left-4 right-4 sm:left-1/2 sm:right-auto sm:-translate-x-1/2 sm:w-[440px] rounded-2xl px-5 py-4 flex items-center justify-between shadow-xl z-30" style={{ background: PALETTE.black }}>

            <span className="flex items-center gap-1.5" style={{ color: PALETTE.goldSoft, fontWeight: 700, fontSize: 14 }}>{formatFCFA(cartTotal)} <ChevronRight size={16} /></span>
          </button>
        )}

        {cartOpen && <CartDrawer items={cartItems} total={cartTotal} onClose={() => setCartOpen(false)} onUpdateQty={updateQty} onCheckout={() => { setCartOpen(false); setCheckoutOpen(true); }} />}
        {checkoutOpen && <CheckoutModal items={cartItems} total={cartTotal} partners={partners} settings={settings} onClose={() => setCheckoutOpen(false)} onConfirm={handleConfirmOrder} />}
        {confirmed && <OrderConfirmation order={confirmed} settings={settings} onClose={() => setConfirmed(null)} />}
        {trackOpen && <TrackOrderModal orders={orders} onClose={() => setTrackOpen(false)} />}
      </div>
    </div>
  );
}

function CheckoutModal({ items, total, partners, settings, onClose, onConfirm }) {
  useBodyScrollLock();
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [orderType, setOrderType] = useState("emporter");
  const [deliveryAddress, setDeliveryAddress] = useState("");
  const [deliveryCoords, setDeliveryCoords] = useState(null);
  const [locating, setLocating] = useState(false);
  const [locationError, setLocationError] = useState("");
  const [paymentMethod, setPaymentMethod] = useState("especes");
  const [partnerCode, setPartnerCode] = useState("");
  const [note, setNote] = useState("");
  const [submitting, setSubmitting] = useState(false);

  const matchedPartner = partners.find((p) => p.code.toLowerCase() === partnerCode.trim().toLowerCase());
  const canSubmit = name.trim().length > 1 && phone.trim().length > 5 && (orderType !== "livraison" || deliveryAddress.trim().length > 3);

  const locateMe = () => {
    if (!navigator.geolocation) { setLocationError("La géolocalisation n'est pas disponible sur cet appareil."); return; }
    setLocating(true); setLocationError("");
    navigator.geolocation.getCurrentPosition(
      (pos) => { setDeliveryCoords({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setLocating(false); },
      () => { setLocationError("Position indisponible — merci d'indiquer votre adresse manuellement."); setLocating(false); },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  };

  const handleSubmit = async () => {
    if (!canSubmit || submitting) return;
    setSubmitting(true);
    await onConfirm({ name, phone, orderType, partnerCode, note, deliveryAddress, deliveryCoords, paymentMethod });
    setSubmitting(false);
  };

  const paymentInfo = {
    mtn: settings.mtnNumber ? `Envoyez le montant au ${settings.mtnNumber} (MTN MoMo), puis présentez l'ID de transaction au retrait.` : "Numéro MTN MoMo non encore configuré — l'équipe vous contactera pour finaliser le paiement.",
    orange: settings.orangeNumber ? `Envoyez le montant au ${settings.orangeNumber} (Orange Money), puis présentez l'ID de transaction au retrait.` : "Numéro Orange Money non encore configuré — l'équipe vous contactera pour finaliser le paiement.",
    banque: settings.bankDetails ? settings.bankDetails : "Coordonnées bancaires non encore configurées — l'équipe vous contactera pour finaliser le paiement.",
  };

  return (
    <div className="fixed inset-0 z-50 overflow-y-auto" style={{ background: "rgba(21,18,14,0.55)", WebkitOverflowScrolling: "touch" }}>
      <div className="min-h-full flex items-end sm:items-center justify-center">
      <div className="w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl p-5" style={{ background: PALETTE.cream }}>
        <div className="flex items-center justify-between mb-4">
          <button onClick={onClose} className="flex items-center gap-1 text-sm font-semibold" style={{ color: PALETTE.inkSoft }}><ArrowLeft size={16} /> Retour</button>
          <h2 className="font-display" style={{ fontSize: 17, fontWeight: 700, color: PALETTE.ink }}>Finaliser</h2>
          <span style={{ width: 50 }} />
        </div>
        <div className="space-y-3.5">
          <TextField label="Nom complet" value={name} onChange={setName} placeholder="Ex. Aïcha Mballa" icon={User} />
          <TextField label="Téléphone" value={phone} onChange={setPhone} placeholder="Ex. 6 99 00 00 00" icon={Phone} type="tel" />

          <div>
            <span style={{ fontSize: 12, color: PALETTE.inkSoft, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>Mode de réception</span>
            <div className="flex gap-2 mt-1.5">
              {ORDER_TYPES.map((t) => (
                <button key={t.id} onClick={() => setOrderType(t.id)} className="flex-1 rounded-xl py-2.5 flex flex-col items-center justify-center gap-1" style={{ background: orderType === t.id ? PALETTE.black : PALETTE.surface, color: orderType === t.id ? PALETTE.goldSoft : PALETTE.ink, border: `1.5px solid ${orderType === t.id ? PALETTE.black : PALETTE.border}` }}>
                  <t.icon size={15} />
                  <span style={{ fontSize: 11.5, fontWeight: 600 }}>{t.label}</span>
                </button>
              ))}
            </div>
          </div>

          {orderType === "livraison" && (
            <div className="rounded-xl p-3.5 space-y-2.5" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
              <TextField label="Adresse de livraison" value={deliveryAddress} onChange={setDeliveryAddress} placeholder="Quartier, repère, rue..." icon={MapPin} />
              <button onClick={locateMe} disabled={locating} className="w-full rounded-lg py-2.5 flex items-center justify-center gap-2" style={{ background: PALETTE.creamSoft, color: PALETTE.goldDeep, fontSize: 12.5, fontWeight: 700 }}>
                {locating ? <Loader2 size={14} className="animate-spin" /> : <Navigation size={14} />}
                {locating ? "Localisation en cours..." : deliveryCoords ? "Position GPS enregistrée ✓" : "Utiliser ma position GPS"}
              </button>
              {locationError && <p style={{ fontSize: 11.5, color: PALETTE.red }}>{locationError}</p>}
              <p style={{ fontSize: 11, color: PALETTE.inkSoft }}>La position GPS aide le livreur à vous trouver plus vite, en complément de l'adresse.</p>
            </div>
          )}

          <div>
            <span style={{ fontSize: 12, color: PALETTE.inkSoft, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>Mode de paiement</span>
            <div className="grid grid-cols-2 gap-2 mt-1.5">
              {PAYMENT_METHODS.map((m) => (
                <button key={m.id} onClick={() => setPaymentMethod(m.id)} className="rounded-xl py-2.5 px-2 text-left" style={{ background: paymentMethod === m.id ? PALETTE.black : PALETTE.surface, color: paymentMethod === m.id ? PALETTE.goldSoft : PALETTE.ink, border: `1.5px solid ${paymentMethod === m.id ? PALETTE.black : PALETTE.border}` }}>
                  <p style={{ fontSize: 12.5, fontWeight: 700 }}>{m.label}</p>
                  <p style={{ fontSize: 10.5, opacity: 0.75 }}>{m.hint}</p>
                </button>
              ))}
            </div>
            {paymentMethod !== "especes" && (
              <p className="mt-2 rounded-lg p-2.5" style={{ background: PALETTE.creamSoft, fontSize: 11.5, color: PALETTE.ink, lineHeight: 1.4 }}>{paymentInfo[paymentMethod]}</p>
            )}
          </div>

          <TextField label="Code partenaire (facultatif)" value={partnerCode} onChange={setPartnerCode} placeholder="Ex. MW-AB123" icon={Percent} />
          {partnerCode.trim() && <p className="flex items-center gap-1.5 -mt-2" style={{ fontSize: 12, color: matchedPartner ? PALETTE.green : PALETTE.red }}>{matchedPartner ? <BadgeCheck size={14} /> : <AlertCircle size={14} />}{matchedPartner ? `Code valide — ${matchedPartner.name}` : "Code introuvable, la commande sera enregistrée sans commission"}</p>}
          <TextField label="Note pour la cuisine (facultatif)" value={note} onChange={setNote} placeholder="Ex. sans oignon" />
          <div className="rounded-xl p-3.5 space-y-1.5" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
            {items.map((i) => <div key={i.id} className="flex justify-between" style={{ fontSize: 12.5, color: PALETTE.inkSoft }}><span>{i.qty} × {i.name}</span><span>{formatFCFA(i.price * i.qty)}</span></div>)}
            <div className="flex justify-between pt-1.5 mt-1.5" style={{ borderTop: `1px solid ${PALETTE.border}`, fontSize: 14, fontWeight: 700, color: PALETTE.ink }}><span>Total</span><span style={{ color: PALETTE.goldDeep }}>{formatFCFA(total)}</span></div>
          </div>
          <PrimaryButton full disabled={!canSubmit || submitting} onClick={handleSubmit} icon={submitting ? Loader2 : Check}>{submitting ? "Envoi..." : "Confirmer la commande"}</PrimaryButton>
          {settings.serviceTel && <p style={{ fontSize: 11, color: PALETTE.inkSoft, textAlign: "center" }}>Une question ? Appelez le {settings.serviceTel}</p>}
        </div>
      </div>
      </div>
    </div>
  );
}

/* ============================== PARTNER VIEW ============================== */
function PartnerView({ partners, orders, onAddPartner, notify }) {
  const [mode, setMode] = useState("intro");
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [loginCode, setLoginCode] = useState("");
  const [activeCode, setActiveCode] = useState(null);
  const [error, setError] = useState("");
  const activePartner = partners.find((p) => p.code === activeCode);

  const handleSignup = async () => {
    if (name.trim().length < 2 || phone.trim().length < 6) { setError("Merci de renseigner votre nom et un numéro valide."); return; }
    const code = genPartnerCode(name);
    const partner = await onAddPartner({ code, name: name.trim(), phone: phone.trim() });
    setActiveCode(partner.code); setMode("dashboard"); notify("Bienvenue dans le programme partenaires !");
  };
  const handleLogin = () => {
    const found = partners.find((p) => p.code.toLowerCase() === loginCode.trim().toLowerCase());
    if (!found) { setError("Code introuvable. Vérifiez et réessayez."); return; }
    setActiveCode(found.code); setMode("dashboard");
  };

  if (mode === "dashboard" && activePartner) return <PartnerDashboard partner={activePartner} orders={orders} onLogout={() => { setActiveCode(null); setMode("intro"); }} notify={notify} />;

  return (
    <div style={{ background: PALETTE.cream, minHeight: "100%" }}>
      <div className="px-4 sm:px-6 pt-8 pb-9" style={{ background: PALETTE.black }}>
        <div className="max-w-3xl mx-auto">
          <Eyebrow>Programme partenaires</Eyebrow>
          <h1 className="font-display" style={{ color: PALETTE.cream, fontSize: 27, fontWeight: 700, maxWidth: 460, lineHeight: 1.2 }}>Partagez M&amp;W Tastes, gagnez à chaque commande.</h1>
          <div className="flex flex-wrap gap-4 mt-5">
            <div className="flex items-center gap-2"><Percent size={16} color={PALETTE.gold} /><span style={{ color: PALETTE.creamSoft, fontSize: 13 }}>10% de commission par vente</span></div>
            <div className="flex items-center gap-2"><Gift size={16} color={PALETTE.gold} /><span style={{ color: PALETTE.creamSoft, fontSize: 13 }}>Un pack offert tous les {BONUS_EVERY} ventes</span></div>
          </div>
        </div>
      </div>
      <div className="max-w-3xl mx-auto px-4 sm:px-6 -mt-5 pb-12">
        <div className="rounded-2xl p-5" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
          {mode === "intro" && (
            <div className="grid sm:grid-cols-2 gap-3">
              <button onClick={() => { setMode("signup"); setError(""); }} className="rounded-xl p-4 text-left" style={{ background: PALETTE.black }}><p style={{ color: PALETTE.goldSoft, fontWeight: 700, fontSize: 14.5 }}>Devenir partenaire</p><p style={{ color: PALETTE.inkSoft, fontSize: 12, marginTop: 3 }}>Créez votre code personnel en 30 secondes.</p></button>
              <button onClick={() => { setMode("login"); setError(""); }} className="rounded-xl p-4 text-left" style={{ background: PALETTE.creamSoft, border: `1px solid ${PALETTE.border}` }}><p style={{ color: PALETTE.ink, fontWeight: 700, fontSize: 14.5 }}>J'ai déjà un code</p><p style={{ color: PALETTE.inkSoft, fontSize: 12, marginTop: 3 }}>Accédez à votre espace partenaire.</p></button>
            </div>
          )}
          {mode === "signup" && (
            <div className="space-y-3.5">
              <button onClick={() => setMode("intro")} className="flex items-center gap-1 text-sm font-semibold" style={{ color: PALETTE.inkSoft }}><ArrowLeft size={15} /> Retour</button>
              <TextField label="Nom complet" value={name} onChange={setName} placeholder="Ex. Junior Etoa" icon={User} />
              <TextField label="Téléphone" value={phone} onChange={setPhone} placeholder="Ex. 6 99 00 00 00" icon={Phone} type="tel" />
              {error && <p style={{ color: PALETTE.red, fontSize: 12.5 }}>{error}</p>}
              <PrimaryButton full onClick={handleSignup}>Créer mon code partenaire</PrimaryButton>
            </div>
          )}
          {mode === "login" && (
            <div className="space-y-3.5">
              <button onClick={() => setMode("intro")} className="flex items-center gap-1 text-sm font-semibold" style={{ color: PALETTE.inkSoft }}><ArrowLeft size={15} /> Retour</button>
              <TextField label="Votre code partenaire" value={loginCode} onChange={setLoginCode} placeholder="Ex. MW-AB123" icon={Percent} />
              {error && <p style={{ color: PALETTE.red, fontSize: 12.5 }}>{error}</p>}
              <PrimaryButton full onClick={handleLogin}>Accéder à mon espace</PrimaryButton>
            </div>
          )}
        </div>
        <div className="mt-5 rounded-2xl p-5" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
          <p className="font-display" style={{ fontWeight: 700, fontSize: 14.5, color: PALETTE.ink, marginBottom: 8 }}>Comment ça marche</p>
          <ol className="space-y-2">
            {["Recevez votre code personnel", "Partagez-le à vos contacts ou sur les réseaux", "Vos filleuls l'indiquent à la commande", "Vous touchez 10% automatiquement"].map((s, i) => (
              <li key={i} className="flex items-start gap-2.5"><span className="rounded-full flex items-center justify-center flex-shrink-0" style={{ width: 20, height: 20, background: PALETTE.creamSoft, color: PALETTE.goldDeep, fontSize: 11, fontWeight: 700 }}>{i + 1}</span><span style={{ fontSize: 13, color: PALETTE.inkSoft }}>{s}</span></li>
            ))}
          </ol>
        </div>
      </div>
    </div>
  );
}

function PartnerDashboard({ partner, orders, onLogout, notify }) {
  const myOrders = orders.filter((o) => o.partnerCode === partner.code);
  const salesCount = myOrders.length;
  const totalCommission = myOrders.reduce((s, o) => s + o.total * COMMISSION_RATE, 0);
  const paid = partner.commissionPaid || 0;
  const due = Math.max(0, totalCommission - paid);
  const packsEarned = Math.floor(salesCount / BONUS_EVERY);
  const packsRedeemed = partner.packsRedeemed || 0;
  const packsAvailable = Math.max(0, packsEarned - packsRedeemed);
  const progressInCycle = (salesCount % BONUS_EVERY) / BONUS_EVERY;
  const copyCode = () => { try { navigator.clipboard.writeText(partner.code); notify("Code copié !"); } catch (e) { notify(partner.code); } };

  return (
    <div style={{ background: PALETTE.cream, minHeight: "100%" }}>
      <div className="px-4 sm:px-6 pt-7 pb-8" style={{ background: PALETTE.black }}>
        <div className="max-w-3xl mx-auto flex items-center justify-between">
          <div><Eyebrow>Espace partenaire</Eyebrow><h1 className="font-display" style={{ color: PALETTE.cream, fontSize: 22, fontWeight: 700 }}>Bonjour, {partner.name.split(" ")[0]}</h1></div>
          <button onClick={onLogout} className="flex items-center gap-1.5 text-xs font-semibold" style={{ color: PALETTE.creamSoft }}><LogOut size={14} /> Quitter</button>
        </div>
      </div>
      <div className="max-w-3xl mx-auto px-4 sm:px-6 -mt-5 pb-12 space-y-4">
        <div className="rounded-2xl p-5 flex items-center justify-between gap-3" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
          <div><p style={{ fontSize: 11, color: PALETTE.inkSoft, textTransform: "uppercase", letterSpacing: "0.05em", fontWeight: 600 }}>Votre code</p><p className="font-display" style={{ fontSize: 22, fontWeight: 700, color: PALETTE.goldDeep, letterSpacing: "0.04em" }}>{partner.code}</p></div>
          <GhostButton icon={Copy} onClick={copyCode}>Copier</GhostButton>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <StatCard icon={TrendingUp} label="Ventes" value={salesCount} accent={PALETTE.gold} />
          <StatCard icon={Wallet} label="Commission gagnée" value={formatFCFA(totalCommission)} accent={PALETTE.green} />
          <StatCard icon={Check} label="Déjà versé" value={formatFCFA(paid)} accent={PALETTE.inkSoft} />
          <StatCard icon={Clock} label="En attente" value={formatFCFA(due)} accent={PALETTE.red} />
        </div>
        <div className="rounded-2xl p-5 flex items-center gap-5" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
          <CircularProgress value={progressInCycle} label={`${salesCount % BONUS_EVERY}/${BONUS_EVERY}`} sublabel="ventes" />
          <div>
            <p className="font-display" style={{ fontWeight: 700, fontSize: 15, color: PALETTE.ink }}>Prochain pack offert</p>
            <p style={{ fontSize: 12.5, color: PALETTE.inkSoft, marginTop: 3 }}>Un pack ou une offre exclusive M&amp;W Tastes tous les {BONUS_EVERY} ventes réalisées.</p>
            {packsAvailable > 0 ? <p className="flex items-center gap-1.5 mt-2" style={{ color: PALETTE.green, fontWeight: 700, fontSize: 13 }}><Gift size={15} /> {packsAvailable} pack{packsAvailable > 1 ? "s" : ""} à récupérer auprès du gérant</p> : <p style={{ color: PALETTE.inkSoft, fontSize: 12, marginTop: 6 }}>Encore {BONUS_EVERY - (salesCount % BONUS_EVERY)} vente(s) avant le prochain pack.</p>}
          </div>
        </div>
        <div className="rounded-2xl p-5" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
          <p className="font-display" style={{ fontWeight: 700, fontSize: 14.5, color: PALETTE.ink, marginBottom: 10 }}>Historique de vos ventes</p>
          {myOrders.length === 0 && <p style={{ fontSize: 13, color: PALETTE.inkSoft }}>Aucune vente avec votre code pour le moment. Partagez-le pour commencer à gagner !</p>}
          <div className="space-y-2">
            {myOrders.slice(0, 8).map((o) => (
              <div key={o.id} className="flex items-center justify-between" style={{ fontSize: 12.5 }}><span style={{ color: PALETTE.inkSoft }}>{fmtDate(o.createdAt)}</span><span style={{ color: PALETTE.ink, fontWeight: 600 }}>{formatFCFA(o.total)}</span><span style={{ color: PALETTE.green, fontWeight: 600 }}>+{formatFCFA(o.total * COMMISSION_RATE)}</span></div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================== ADMIN VIEW ============================== */
function AdminView({ menu, orders, partners, settings, onUpdateOrderStatus, onTogglePaid, onUpdateSettings, onAddMenuItem, onUpdateMenuItem, onDeleteMenuItem, onMarkPartnerPaid, onRedeemPack, onExportData, onImportData, notify }) {
  const [authed, setAuthed] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState("");
  const [tab, setTab] = useState("overview");
  const adminPin = settings.adminPin || "2025";
  const tryLogin = () => { if (pinInput === adminPin) { setAuthed(true); setPinError(""); } else setPinError("Code incorrect."); };

  if (!authed) {
    return (
      <div className="min-h-[70vh] flex items-center justify-center px-4" style={{ background: PALETTE.cream }}>
        <div className="w-full max-w-xs rounded-2xl p-6 text-center" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
          <div className="mx-auto mb-3 rounded-full flex items-center justify-center" style={{ width: 50, height: 50, background: PALETTE.black }}><Lock size={20} color={PALETTE.gold} /></div>
          <p className="font-display" style={{ fontWeight: 700, fontSize: 17, color: PALETTE.ink }}>Espace de gestion</p>
          <p style={{ fontSize: 12, color: PALETTE.inkSoft, marginTop: 3, marginBottom: 14 }}>Réservé au gérant de M&amp;W Tastes</p>
          <TextField value={pinInput} onChange={setPinInput} placeholder="Code PIN" type="password" />
          {pinError && <p style={{ color: PALETTE.red, fontSize: 12, marginTop: 6 }}>{pinError}</p>}
          <div className="mt-3"><PrimaryButton full onClick={tryLogin}>Entrer</PrimaryButton></div>
          <p style={{ fontSize: 10.5, color: PALETTE.inkSoft, marginTop: 10 }}>Code par défaut : 2025 — à changer dans Paramètres.</p>
        </div>
      </div>
    );
  }

  const tabs = [
    { id: "overview", label: "Vue d'ensemble", icon: TrendingUp },
    { id: "orders", label: "Commandes", icon: ClipboardList },
    { id: "partners", label: "Partenaires", icon: Users },
    { id: "menu", label: "Menu", icon: ChefHat },
    { id: "settings", label: "Réglages", icon: Settings },
  ];

  return (
    <div style={{ background: PALETTE.cream, minHeight: "100%" }}>
      <div className="px-4 sm:px-6 pt-6 pb-4" style={{ background: PALETTE.black }}>
        <div className="max-w-5xl mx-auto"><Eyebrow>Gestion interne</Eyebrow><h1 className="font-display" style={{ color: PALETTE.cream, fontSize: 22, fontWeight: 700 }}>Tableau de bord</h1></div>
      </div>
      <div className="max-w-5xl mx-auto px-4 sm:px-6">
        <div className="flex gap-1.5 overflow-x-auto scrollbar-thin -mt-3 mb-5 pb-1">
          {tabs.map((t) => <button key={t.id} onClick={() => setTab(t.id)} className="rounded-xl px-3.5 py-2.5 flex items-center gap-1.5 whitespace-nowrap" style={{ background: tab === t.id ? PALETTE.black : PALETTE.surface, color: tab === t.id ? PALETTE.goldSoft : PALETTE.ink, border: `1px solid ${tab === t.id ? PALETTE.black : PALETTE.border}`, fontSize: 12.5, fontWeight: 600 }}><t.icon size={14} /> {t.label}</button>)}
        </div>
        <div className="pb-12">
          {tab === "overview" && <AdminOverview orders={orders} partners={partners} />}
          {tab === "orders" && <AdminOrders orders={orders} onUpdateOrderStatus={onUpdateOrderStatus} onTogglePaid={onTogglePaid} />}
          {tab === "partners" && <AdminPartners partners={partners} orders={orders} onMarkPartnerPaid={onMarkPartnerPaid} onRedeemPack={onRedeemPack} />}
          {tab === "menu" && <AdminMenu menu={menu} onAddMenuItem={onAddMenuItem} onUpdateMenuItem={onUpdateMenuItem} onDeleteMenuItem={onDeleteMenuItem} notify={notify} />}
          {tab === "settings" && <AdminSettings settings={settings} onUpdateSettings={onUpdateSettings} onExportData={onExportData} onImportData={onImportData} notify={notify} />}
        </div>
      </div>
    </div>
  );

function AdminOverview({ orders, partners }) {
  const totalRevenue = orders.reduce((s, o) => s + o.total, 0);
  const totalCommissions = orders.filter((o) => o.partnerCode).reduce((s, o) => s + o.total * COMMISSION_RATE, 0);
  const paidOut = partners.reduce((s, p) => s + (p.commissionPaid || 0), 0);
  const today = new Date().toDateString();
  const ordersToday = orders.filter((o) => new Date(o.createdAt).toDateString() === today).length;
  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <StatCard icon={Wallet} label="Revenu total" value={formatFCFA(totalRevenue)} accent={PALETTE.gold} />
        <StatCard icon={ClipboardList} label="Commandes" value={orders.length} hint={`${ordersToday} aujourd'hui`} accent={PALETTE.green} />
        <StatCard icon={Users} label="Partenaires" value={partners.length} accent={PALETTE.terracotta} />
        <StatCard icon={Percent} label="Commissions dues" value={formatFCFA(totalCommissions - paidOut)} accent={PALETTE.red} />
      </div>
      <div className="rounded-2xl p-5" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
        <p className="font-display" style={{ fontWeight: 700, fontSize: 14.5, marginBottom: 10 }}>Dernières commandes</p>
        {orders.length === 0 && <p style={{ fontSize: 13, color: PALETTE.inkSoft }}>Aucune commande pour le moment.</p>}
        <div className="space-y-2">{orders.slice(0, 6).map((o) => <div key={o.id} className="flex items-center justify-between text-sm"><span style={{ color: PALETTE.ink, fontWeight: 600 }}>{o.customerName}</span><span style={{ color: PALETTE.inkSoft, fontSize: 12 }}>{fmtDate(o.createdAt)}</span><StatusBadge status={o.status} /></div>)}</div>
      </div>
    </div>
  );
}

function AdminOrders({ orders, onUpdateOrderStatus, onTogglePaid }) {
  const statuses = ["Nouvelle", "En préparation", "Prête", "Livrée"];
  const typeLabel = (id) => ORDER_TYPES.find((t) => t.id === id)?.label || id;
  const payLabel = (id) => PAYMENT_METHODS.find((p) => p.id === id)?.label || "Espèces";
  if (orders.length === 0) return <p style={{ fontSize: 13, color: PALETTE.inkSoft }}>Aucune commande enregistrée pour le moment.</p>;
  return (
    <div className="space-y-3">
      {orders.map((o) => (
        <div key={o.id} className="rounded-2xl p-4" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div><p style={{ fontWeight: 700, fontSize: 14, color: PALETTE.ink }}>{o.id} · {o.customerName}</p><p style={{ fontSize: 12, color: PALETTE.inkSoft }}>{o.phone} · {fmtDate(o.createdAt)} · {typeLabel(o.orderType)}</p></div>
            <select value={o.status} onChange={(e) => onUpdateOrderStatus(o.id, e.target.value)} className="rounded-lg px-2.5 py-1.5 text-xs font-semibold" style={{ border: `1.5px solid ${PALETTE.border}`, color: PALETTE.ink, background: PALETTE.cream }}>{statuses.map((s) => <option key={s} value={s}>{s}</option>)}</select>
          </div>

          {o.orderType === "livraison" && (
            <div className="mt-2 rounded-lg p-2.5 flex items-start gap-2" style={{ background: PALETTE.creamSoft }}>
              <MapPin size={14} color={PALETTE.terracotta} className="flex-shrink-0 mt-0.5" />
              <div className="min-w-0">
                <p style={{ fontSize: 12, color: PALETTE.ink }}>{o.deliveryAddress || "Adresse non précisée"}</p>
                {o.deliveryCoords && <a href={`https://www.google.com/maps?q=${o.deliveryCoords.lat},${o.deliveryCoords.lng}`} target="_blank" rel="noreferrer" className="text-xs font-semibold inline-flex items-center gap-1 mt-1" style={{ color: PALETTE.goldDeep }}><Navigation size={11} /> Voir la position GPS sur la carte</a>}
              </div>
            </div>
          )}

          <div className="mt-2.5 flex flex-wrap gap-1.5">{o.items.map((i, idx) => <span key={idx} className="rounded-full px-2.5 py-1" style={{ background: PALETTE.creamSoft, fontSize: 11.5, color: PALETTE.ink }}>{i.qty}× {i.name}</span>)}</div>

          <div className="flex items-center justify-between mt-2.5 flex-wrap gap-2">
            <div className="flex items-center gap-2">
              <span style={{ fontSize: 13, fontWeight: 700, color: PALETTE.goldDeep }}>{formatFCFA(o.total)}</span>
              <span className="rounded-full px-2 py-0.5" style={{ background: PALETTE.creamSoft, fontSize: 11, color: PALETTE.ink, fontWeight: 600 }}>{payLabel(o.paymentMethod)}</span>
              {o.partnerCode && <span style={{ fontSize: 11.5, color: PALETTE.green, fontWeight: 600 }}>Partenaire {o.partnerCode}</span>}
            </div>
            <button onClick={() => onTogglePaid(o.id)} className="rounded-lg px-2.5 py-1 flex items-center gap-1" style={{ background: o.paid ? PALETTE.greenSoft : PALETTE.redSoft, color: o.paid ? PALETTE.green : PALETTE.red, fontSize: 11, fontWeight: 700 }}>
              <Check size={12} /> {o.paid ? "Payé" : "Marquer payé"}
            </button>
          </div>
          {o.note && <p style={{ fontSize: 11.5, color: PALETTE.inkSoft, marginTop: 4, fontStyle: "italic" }}>Note : {o.note}</p>}
        </div>
      ))}
    </div>
  );
}

function AdminPartners({ partners, orders, onMarkPartnerPaid, onRedeemPack }) {
  if (partners.length === 0) return <p style={{ fontSize: 13, color: PALETTE.inkSoft }}>Aucun partenaire inscrit pour le moment.</p>;
  return (
    <div className="space-y-3">
      {partners.map((p) => {
        const myOrders = orders.filter((o) => o.partnerCode === p.code);
        const total = myOrders.reduce((s, o) => s + o.total * COMMISSION_RATE, 0);
        const paid = p.commissionPaid || 0;
        const due = Math.max(0, total - paid);
        const packsEarned = Math.floor(myOrders.length / BONUS_EVERY);
        const packsAvailable = Math.max(0, packsEarned - (p.packsRedeemed || 0));
        return (
          <div key={p.code} className="rounded-2xl p-4" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
            <div className="flex items-center justify-between flex-wrap gap-2">
              <div><p style={{ fontWeight: 700, fontSize: 14, color: PALETTE.ink }}>{p.name} · <span style={{ color: PALETTE.goldDeep }}>{p.code}</span></p><p style={{ fontSize: 12, color: PALETTE.inkSoft }}>{p.phone} · {myOrders.length} vente{myOrders.length !== 1 ? "s" : ""}</p></div>
              {packsAvailable > 0 && <button onClick={() => onRedeemPack(p.code)} className="rounded-lg px-2.5 py-1.5 flex items-center gap-1" style={{ background: PALETTE.greenSoft, color: PALETTE.green, fontSize: 11.5, fontWeight: 700 }}><Gift size={13} /> {packsAvailable} pack{packsAvailable > 1 ? "s" : ""} — marquer remis</button>}
            </div>
            <div className="grid grid-cols-3 gap-2 mt-3">
              <div className="rounded-lg p-2 text-center" style={{ background: PALETTE.creamSoft }}><p style={{ fontSize: 10.5, color: PALETTE.inkSoft }}>Gagné</p><p style={{ fontSize: 13, fontWeight: 700 }}>{formatFCFA(total)}</p></div>
              <div className="rounded-lg p-2 text-center" style={{ background: PALETTE.creamSoft }}><p style={{ fontSize: 10.5, color: PALETTE.inkSoft }}>Versé</p><p style={{ fontSize: 13, fontWeight: 700 }}>{formatFCFA(paid)}</p></div>
              <div className="rounded-lg p-2 text-center" style={{ background: PALETTE.redSoft }}><p style={{ fontSize: 10.5, color: PALETTE.red }}>Dû</p><p style={{ fontSize: 13, fontWeight: 700, color: PALETTE.red }}>{formatFCFA(due)}</p></div>
            </div>
            {due > 0 && <button onClick={() => onMarkPartnerPaid(p.code, total)} className="mt-2.5 text-xs font-semibold flex items-center gap-1" style={{ color: PALETTE.goldDeep }}><Check size={13} /> Marquer la commission comme versée</button>}
          </div>
        );
      })}
    </div>
  );
}

function AdminMenu({ menu, onAddMenuItem, onUpdateMenuItem, onDeleteMenuItem, notify }) {
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);
  const [imgUploading, setImgUploading] = useState(false);
  const blank = { name: "", price: "", desc: "", groupId: GROUPS_META[0].id, image: null };
  const [draft, setDraft] = useState(blank);

  const startEdit = (item) => { setEditing(item.id); setDraft({ ...item, price: String(item.price) }); setAdding(false); };
  const cancel = () => { setEditing(null); setAdding(false); setDraft(blank); };

  const handleImageChange = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setImgUploading(true);
    try {
      const dataUrl = await resizeImageFile(file);
      setDraft((d) => ({ ...d, image: dataUrl }));
    } catch (err) {
      notify("Impossible de charger cette image");
    }
    setImgUploading(false);
  };

  const save = async () => {
    if (!draft.name.trim() || !draft.price) return;
    const payload = { ...draft, price: Number(draft.price) || 0 };
    if (adding) { await onAddMenuItem({ ...payload, id: `item-${Date.now()}`, active: true }); notify("Article ajouté"); }
    else { await onUpdateMenuItem(editing, payload); notify("Article mis à jour"); }
    cancel();
  };

  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between">
        <p className="font-display" style={{ fontWeight: 700, fontSize: 15 }}>{menu.length} article{menu.length !== 1 ? "s" : ""}</p>
        <PrimaryButton icon={Plus} onClick={() => { setAdding(true); setEditing(null); setDraft(blank); }}>Ajouter</PrimaryButton>
      </div>

      {(adding || editing) && (
        <div className="rounded-2xl p-4 space-y-2.5" style={{ background: PALETTE.surface, border: `1.5px solid ${PALETTE.gold}` }}>
          <div className="grid grid-cols-2 gap-2.5">
            <TextField label="Nom" value={draft.name} onChange={(v) => setDraft({ ...draft, name: v })} />
            <TextField label="Prix (FCFA)" value={draft.price} onChange={(v) => setDraft({ ...draft, price: v })} type="number" />
          </div>
          <TextField label="Description" value={draft.desc} onChange={(v) => setDraft({ ...draft, desc: v })} />
          <label className="block">
            <span style={{ fontSize: 12, color: PALETTE.inkSoft, fontWeight: 600 }}>Formule / Onglet</span>
            <select value={draft.groupId} onChange={(e) => setDraft({ ...draft, groupId: e.target.value })} className="w-full mt-1.5 rounded-xl px-3 py-3" style={{ border: `1.5px solid ${PALETTE.border}`, background: PALETTE.cream, fontSize: 13 }}>
              {GROUPS_META.map((g) => <option key={g.id} value={g.id}>{g.icon} {g.label}</option>)}
            </select>
          </label>

          <div>
            <span style={{ fontSize: 12, color: PALETTE.inkSoft, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>Photo de l'article</span>
            <div className="flex items-center gap-3 mt-1.5">
              <ItemThumb item={draft} size={56} />
              <label className="flex-1 rounded-xl py-2.5 px-3 flex items-center justify-center gap-2 cursor-pointer" style={{ background: PALETTE.creamSoft, border: `1.5px dashed ${PALETTE.border}`, color: PALETTE.ink, fontSize: 12.5, fontWeight: 600 }}>
                {imgUploading ? <Loader2 size={14} className="animate-spin" /> : <ImagePlus size={15} />}
                {imgUploading ? "Chargement..." : draft.image ? "Changer la photo" : "Insérer une photo"}
                <input type="file" accept="image/*" onChange={handleImageChange} className="hidden" />
              </label>
              {draft.image && (
                <button onClick={() => setDraft((d) => ({ ...d, image: null }))} className="rounded-lg p-2" style={{ background: PALETTE.redSoft }}><Trash2 size={14} color={PALETTE.red} /></button>
              )}
            </div>
            <p style={{ fontSize: 10.5, color: PALETTE.inkSoft, marginTop: 4 }}>Choisissez une photo depuis votre téléphone ou ordinateur — elle est automatiquement redimensionnée.</p>
          </div>

          <div className="flex gap-2 pt-1"><PrimaryButton icon={Save} onClick={save}>Enregistrer</PrimaryButton><GhostButton onClick={cancel}>Annuler</GhostButton></div>
        </div>
      )}

      {GROUPS_META.map((g) => {
        const items = menu.filter((m) => m.groupId === g.id);
        if (items.length === 0) return null;
        return (
          <div key={g.id}>
            <p style={{ fontSize: 11.5, fontWeight: 700, color: PALETTE.inkSoft, textTransform: "uppercase", letterSpacing: "0.05em", margin: "10px 2px 6px" }}>{g.icon} {g.label}</p>
            <div className="space-y-2">
              {items.map((item) => (
                <div key={item.id} className="rounded-2xl p-3.5 flex items-center gap-3" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}`, opacity: item.active === false ? 0.55 : 1 }}>
                  <ItemThumb item={item} size={44} />
                  <div className="flex-1 min-w-0"><p style={{ fontWeight: 700, fontSize: 13.5, color: PALETTE.ink }}>{item.name}</p><p style={{ fontSize: 11.5, color: PALETTE.inkSoft }}>{formatFCFA(item.price)}</p></div>
                  <button onClick={() => onUpdateMenuItem(item.id, { active: item.active === false })} className="rounded-lg px-2 py-1.5" style={{ background: PALETTE.creamSoft, fontSize: 10.5, fontWeight: 600, color: PALETTE.ink }}>{item.active === false ? "Indisponible" : "Disponible"}</button>
                  <button onClick={() => startEdit(item)}><Pencil size={15} color={PALETTE.inkSoft} /></button>
                  <button onClick={() => onDeleteMenuItem(item.id)}><Trash2 size={15} color={PALETTE.red} /></button>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function AdminSettings({ settings, onUpdateSettings, onExportData, onImportData, notify }) {
  const [newPin, setNewPin] = useState("");
  const [serviceTel, setServiceTel] = useState(settings.serviceTel || "");
  const [mtnNumber, setMtnNumber] = useState(settings.mtnNumber || "");
  const [orangeNumber, setOrangeNumber] = useState(settings.orangeNumber || "");
  const [bankDetails, setBankDetails] = useState(settings.bankDetails || "");

  const changePin = async () => {
    if (newPin.trim().length < 4) { notify("Le code doit faire au moins 4 chiffres."); return; }
    await onUpdateSettings({ ...settings, adminPin: newPin.trim() }); setNewPin(""); notify("Code PIN mis à jour");
  };
  const saveContact = async () => {
    await onUpdateSettings({ ...settings, serviceTel, mtnNumber, orangeNumber, bankDetails });
    notify("Coordonnées mises à jour");
  };
  const handleImportFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) onImportData(file);
    e.target.value = "";
  };

  return (
    <div className="space-y-4">
      <div className="rounded-2xl p-5 space-y-2.5" style={{ background: PALETTE.surface, border: `1.5px solid ${PALETTE.gold}` }}>
        <p className="font-display" style={{ fontWeight: 700, fontSize: 14.5 }}>Sauvegarde manuelle</p>
        <p style={{ fontSize: 12, color: PALETTE.inkSoft, lineHeight: 1.5 }}>Si la sauvegarde automatique ne fonctionne pas dans ton environnement, télécharge une sauvegarde après chaque modification, puis restaure-la à la prochaine ouverture pour retrouver ton menu, tes commandes et tes partenaires.</p>
        <div className="flex gap-2">
          <PrimaryButton icon={Save} onClick={onExportData}>Télécharger une sauvegarde</PrimaryButton>
          <label className="rounded-xl px-5 py-3 flex items-center justify-center gap-2 cursor-pointer" style={{ background: "transparent", border: `1.5px solid ${PALETTE.border}`, color: PALETTE.ink, fontWeight: 600, fontSize: 14 }}>
            Restaurer
            <input type="file" accept="application/json" onChange={handleImportFile} className="hidden" />
          </label>
        </div>
      </div>

      <div className="rounded-2xl p-5 space-y-3" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
        <p className="font-display" style={{ fontWeight: 700, fontSize: 14.5 }}>Contact & paiements</p>
        <TextField label="Numéro service client" value={serviceTel} onChange={setServiceTel} placeholder="+237 6XX XXX XXX" icon={Phone} />
        <TextField label="Numéro MTN Mobile Money" value={mtnNumber} onChange={setMtnNumber} placeholder="+237 6XX XXX XXX" icon={Smartphone} />
        <TextField label="Numéro Orange Money" value={orangeNumber} onChange={setOrangeNumber} placeholder="+237 6XX XXX XXX" icon={Smartphone} />
        <TextField label="Coordonnées bancaires (RIB / IBAN)" value={bankDetails} onChange={setBankDetails} placeholder="Banque, numéro de compte..." icon={Building2} />
        <PrimaryButton onClick={saveContact}>Enregistrer ces coordonnées</PrimaryButton>
        <p style={{ fontSize: 11, color: PALETTE.inkSoft }}>Ces informations s'affichent aux clients qui choisissent MTN MoMo, Orange Money ou virement bancaire au moment de la commande.</p>
      </div>

      <div className="rounded-2xl p-5" style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}` }}>
        <p className="font-display" style={{ fontWeight: 700, fontSize: 14.5, marginBottom: 10 }}>Changer le code PIN de gestion</p>
        <div className="flex gap-2 items-end"><div className="flex-1"><TextField value={newPin} onChange={setNewPin} placeholder="Nouveau code" type="password" /></div><PrimaryButton onClick={changePin}>Mettre à jour</PrimaryButton></div>
      </div>

      <div className="rounded-2xl p-5 flex items-start gap-3" style={{ background: PALETTE.creamSoft, border: `1px solid ${PALETTE.border}` }}>
        <AlertCircle size={18} color={PALETTE.terracotta} className="flex-shrink-0 mt-0.5" />
        <p style={{ fontSize: 12.5, color: PALETTE.ink, lineHeight: 1.5 }}>Les paiements Mobile Money et bancaires ne sont pas traités automatiquement par l'application : le client envoie le paiement au numéro affiché, puis l'équipe le confirme manuellement en marquant la commande "Payé" dans Commandes. Les données (commandes, partenaires, menu) sont partagées et visibles par toute personne ayant accès à cette application.</p>
      </div>
    </div>
  );
}

/* ============================== ROOT APP ============================== */
function App() {
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("menu");
  const [menu, setMenu] = useState(DEFAULT_MENU);
  const [orders, setOrders] = useState([]);
  const [partners, setPartners] = useState([]);
  const [settings, setSettings] = useState({ adminPin: "2025", serviceTel: "+237 658045643", mtnNumber: "+237 677034742", orangeNumber: "+237 699642883", bankDetails: "Titulaire : Mme GRACE ELODIE MANICH KOUAM — OM IBAN : CM21 13001 00001 10020276349 97" });
  const [toast, setToast] = useState("");
  const notify = (msg) => setToast(msg);

  const safePersist = (key, value) => {
    return persist(key, value);
  };

  useEffect(() => {
    let mounted = true;
    function load() {

      const safeGet = (key, fallback) => {
        try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : fallback; }
        catch (e) { return fallback; }
      };
      const [m, o, p, s] = await Promise.all([
        safeGet("menu_v3", DEFAULT_MENU),
        safeGet("orders", []),
        safeGet("partners", []),
        safeGet("settings", { adminPin: "2025", serviceTel: "+237 658045643", mtnNumber: "+237 677034742", orangeNumber: "+237 699642883", bankDetails: "Titulaire : Mme GRACE ELODIE MANICH KOUAM — OM IBAN : CM21 13001 00001 10020276349 97" }),
      ]);
      if (!mounted) return;
      setMenu(m); setOrders(o); setPartners(p); setSettings(s);
      setLoading(false);
      safePersist("menu_v3", m);
    }
    load();
    return () => { mounted = false; };
  }, []);

  const placeOrder = async (orderDraft) => {
    const order = { ...orderDraft, id: genOrderId(), createdAt: new Date().toISOString(), status: "Nouvelle" };
    const updated = [order, ...orders];
    setOrders(updated); safePersist("orders", updated); return order;
  };
  const updateOrderStatus = async (id, status) => {
    const updated = orders.map((o) => (o.id === id ? { ...o, status } : o));
    setOrders(updated); safePersist("orders", updated);
  };
  const toggleOrderPaid = async (id) => {
    const updated = orders.map((o) => (o.id === id ? { ...o, paid: !o.paid } : o));
    setOrders(updated); safePersist("orders", updated);
  };
  const addPartner = async (partnerDraft) => {
    const partner = { ...partnerDraft, createdAt: new Date().toISOString(), commissionPaid: 0, packsRedeemed: 0 };
    const updated = [...partners, partner];
    setPartners(updated); safePersist("partners", updated); return partner;
  };
  const markPartnerPaid = async (code, totalEarned) => {
    const updated = partners.map((p) => (p.code === code ? { ...p, commissionPaid: totalEarned } : p));
    setPartners(updated); safePersist("partners", updated); notify("Commission marquée comme versée");
  };
  const redeemPack = async (code) => {
    const updated = partners.map((p) => (p.code === code ? { ...p, packsRedeemed: (p.packsRedeemed || 0) + 1 } : p));
    setPartners(updated); safePersist("partners", updated); notify("Pack marqué comme remis");
  };
  const addMenuItem = async (item) => { const updated = [...menu, item]; setMenu(updated); safePersist("menu_v3", updated); };
  const updateMenuItem = async (id, patch) => { const updated = menu.map((m) => (m.id === id ? { ...m, ...patch } : m)); setMenu(updated); safePersist("menu_v3", updated); };
  const deleteMenuItem = async (id) => { const updated = menu.filter((m) => m.id !== id); setMenu(updated); safePersist("menu_v3", updated); };
  const updateSettings = async (next) => { setSettings(next); safePersist("settings", next); };

  const exportData = () => {
    try {
      const payload = { menu, orders, partners, settings, exportedAt: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `mw-tastes-sauvegarde-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      notify("Sauvegarde téléchargée ✓");
    } catch (e) {
      notify("Impossible de générer la sauvegarde");
    }
  };

  const importData = async (file) => {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (data.menu) { setMenu(data.menu); safePersist("menu_v3", data.menu); }
      if (data.orders) { setOrders(data.orders); safePersist("orders", data.orders); }
      if (data.partners) { setPartners(data.partners); safePersist("partners", data.partners); }
      if (data.settings) { setSettings(data.settings); safePersist("settings", data.settings); }
      notify("Sauvegarde restaurée ✓");
    } catch (e) {
      notify("Fichier de sauvegarde invalide");
    }
  };

  if (loading) {
    return <div className="min-h-screen flex items-center justify-center" style={{ background: PALETTE.black }}><Loader2 className="animate-spin" size={26} color={PALETTE.gold} /></div>;
  }

  return (
    <div className="min-h-screen" style={{ background: PALETTE.cream }}>
      <style>{`
        * { font-family: 'Outfit', sans-serif; }
        .font-display { font-family: 'Playfair Display', serif; }
        .scrollbar-thin::-webkit-scrollbar { height: 5px; width: 5px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: ${PALETTE.gold}; border-radius: 4px; }
        select { -webkit-appearance: none; appearance: none; }
      `}</style>
      <Header view={view} setView={setView} />

      {view === "menu" && <MenuView menu={menu} orders={orders} partners={partners} settings={settings} onPlaceOrder={placeOrder} notify={notify} />}
      {view === "partner" && <PartnerView partners={partners} orders={orders} onAddPartner={addPartner} notify={notify} />}
      {view === "admin" && <AdminView menu={menu} orders={orders} partners={partners} settings={settings} onUpdateOrderStatus={updateOrderStatus} onTogglePaid={toggleOrderPaid} onUpdateSettings={updateSettings} onAddMenuItem={addMenuItem} onUpdateMenuItem={updateMenuItem} onDeleteMenuItem={deleteMenuItem} onMarkPartnerPaid={markPartnerPaid} onRedeemPack={redeemPack} onExportData={exportData} onImportData={importData} notify={notify} />}
      <Toast message={toast} onClose={() => setToast("")} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
